<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Signals</title>
<style>
body{ font-family:Arial; background:#0f172a; color:white; padding:30px }
h1{text-align:center; color: blue}
.stats{display:flex; gap:20px; justify-content:center; margin-bottom:30px}
.box{background:#1e293b; padding:15px 25px; border-radius:8px}
table{width:100%; border-collapse:collapse}
th,td{padding:10px; border-bottom:1px solid #333; text-align:center}
.buy{color:#22c55e} .sell{color:#ef4444} .active{color:#22c55e} .closed{color:#ef4444}
</style>
</head>
<body>

<h1>Trading Signals</h1>

<div class="stats">
  <div class="box">Total Trades: <span id="total"></span></div>
  <div class="box">Win Rate: <span id="winrate"></span>%</div>
  <div class="box">Total Pips: <span id="pips"></span></div>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Type</th><th>Pair</th><th>Entry Price</th>
<th>Stop Loss</th><th>Targets</th><th>Status</th><th>Date</th>
</tr>
</thead>
<tbody id="signals"></tbody>
</table>

<script>
async function loadSignals(){
  try {
    let res = await fetch("https://ictfx.pythonanywhere.com/signals")
    let data = await res.json()
    let html = ""
    data.forEach(s=>{
      html += `<tr>
        <td>${s.id}</td>
        <td class="${s.type.includes('⬆️')?'buy':'sell'}">${s.type}</td>
        <td>${s.pair}</td>
        <td>${s.entry}</td>
        <td>${s.sl}</td>
        <td>${s.targets.join(" ")}</td>
        <td class="${s.active?'active':'closed'}">${s.active?'Active':'Closed'}</td>
        <td>${s.time}</td>
      </tr>`
    })
    document.getElementById("signals").innerHTML = html
  } catch(e){ console.error(e) }
}

async function loadStats(){
  try {
    let r = await fetch("https://ictfx.pythonanywhere.com/stats")
    let s = await r.json()
    document.getElementById("total").innerText = s.total
    document.getElementById("winrate").innerText = s.winrate
    document.getElementById("pips").innerText = s.pips
  } catch(e){ console.error(e) }
}

// تحديث تلقائي
setInterval(()=>{
  loadSignals()
  loadStats()
}, 3000)

loadSignals()
loadStats()
</script>

</body>
</html>
